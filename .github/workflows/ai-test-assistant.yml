name: AI Test Assistant

on:
  pull_request:
    paths:
      - "**/*.py"

jobs:
  ai-test-assistant:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Run AI Test Assistant
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          ai-test-assistant run-pr-assistant \
            --base-ref origin/${{ github.base_ref }} \
            --output-dir tests/generated \
            --suggestions-dir reports/suggested-tests \
            --report reports/ai-test-report.md

      - name: Add report to GitHub summary
        if: always()
        run: |
          cat reports/ai-test-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload generated tests and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-assistant-output
          path: |
            tests/generated/
            reports/
